server:
  port: 5600

spring:
  application:
    name: nexus-backend

  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/eisa_nexus}
    username: eisa_nexus
    password: eisa_nexus123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        default_schema: public

app:
  jwt:
    secret: ${JWT_SECRET:Y2hhbmdlLW1lLXBsZWFzZS1jaGFuZ2UtbWUtcGxlYXNlLWNoYW5nZS1tZQ==}
    expiration-ms: 900000
    refresh-expiration-ms: 1209600000

  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

  bootstrap:
    admin-email: ${ADMIN_EMAIL:admin@eisa.org}
    admin-password: ${ADMIN_PASSWORD:admin1234}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /api/swagger-ui.html

logging:
  level:
    org.springframework.security: INFO
    org.hibernate.SQL: WARN
