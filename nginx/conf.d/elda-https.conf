# Redirection HTTP → HTTPS (conserve le chemin certbot)
server {
    listen 80;
    server_name elda.africa www.elda.africa api.elda.africa;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Frontend — elda.africa / www.elda.africa
server {
    listen 443 ssl;
    http2 on;
    server_name elda.africa www.elda.africa;

    ssl_certificate     /etc/letsencrypt/live/elda.africa/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/elda.africa/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    root  /usr/share/nginx/html;
    index index.html;

    # SPA — toutes les routes renvoient index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache long pour les assets versionnés
    location ~* \.(js|css|png|jpg|jpeg|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# API — api.elda.africa → Spring Boot
server {
    listen 443 ssl;
    http2 on;
    server_name api.elda.africa;

    ssl_certificate     /etc/letsencrypt/live/elda.africa/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/elda.africa/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    client_max_body_size 20M;

    location / {
        proxy_pass         http://backend:5600;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout    60s;
    }
}
