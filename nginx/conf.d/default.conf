# Configuration HTTP initiale — utilisée UNIQUEMENT pour obtenir le certificat SSL.
# Remplacée par elda-https.conf après l'exécution de scripts/02-init-ssl.sh

server {
    listen 80;
    server_name elda.africa www.elda.africa api.elda.africa;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 200 'ELDA Africa - SSL initialization in progress...';
        add_header Content-Type text/plain;
    }
}
